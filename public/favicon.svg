<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Chronos Earth: half clock (time), half globe (Earth). -->
  <defs>
    <clipPath id="left"><rect x="0" y="0" width="32" height="64"/></clipPath>
    <clipPath id="right"><rect x="32" y="0" width="32" height="64"/></clipPath>
  </defs>

  <!-- Left half: the clock. -->
  <g clip-path="url(#left)">
    <circle cx="32" cy="32" r="29" fill="#f2e9d4"/>
    <!-- hour ticks -->
    <line x1="32" y1="6"  x2="32" y2="12" stroke="#3a3428" stroke-width="3" stroke-linecap="round"/>
    <line x1="13.6" y1="13.6" x2="17.9" y2="17.9" stroke="#3a3428" stroke-width="3" stroke-linecap="round"/>
    <line x1="6"  y1="32" x2="12" y2="32" stroke="#3a3428" stroke-width="3" stroke-linecap="round"/>
    <line x1="13.6" y1="50.4" x2="17.9" y2="46.1" stroke="#3a3428" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="52" x2="32" y2="58" stroke="#3a3428" stroke-width="3" stroke-linecap="round"/>
    <!-- hands: hour toward 10, minute toward 12 -->
    <line x1="32" y1="32" x2="19" y2="24" stroke="#2b2620" stroke-width="4.2" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="31" y2="13" stroke="#2b2620" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="32" r="2.6" fill="#2b2620"/>
  </g>

  <!-- Right half: the globe. -->
  <g clip-path="url(#right)">
    <circle cx="32" cy="32" r="29" fill="#2e6fbb"/>
    <!-- landmasses -->
    <path d="M36 12 q7 -2 11 3 q5 5 2 10 q-6 3 -10 -1 q-6 -5 -3 -12 z" fill="#4d9e55"/>
    <path d="M40 32 q9 -3 14 4 q3 6 -2 11 q-7 4 -12 -2 q-4 -7 0 -13 z" fill="#4d9e55"/>
    <path d="M34 50 q5 -1 7 3 q1 4 -3 6 q-5 1 -7 -3 q-1 -4 3 -6 z" fill="#4d9e55"/>
    <!-- graticule -->
    <ellipse cx="32" cy="32" rx="14" ry="29" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.6"/>
    <line x1="32" y1="32" x2="61" y2="32" stroke="rgba(255,255,255,0.45)" stroke-width="1.6"/>
    <path d="M32 12 q20 0 20 20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
    <path d="M32 52 q20 0 20 -20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  </g>

  <!-- Unifying rim + the seam between time and Earth. -->
  <line x1="32" y1="3" x2="32" y2="61" stroke="#1d2735" stroke-width="2.4"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#1d2735" stroke-width="3.4"/>
</svg>
