# The AUTOMATED HARVESTER — grows the history dataset with no human (and no
# AI tokens) involved. Runs nightly, or on demand from the Actions tab ("Run
# workflow" button). It fetches new Wikidata events (additive union — it can
# only ADD, never lose), rebuilds the index, and commits; the commit then
# triggers the normal Pages deploy, so fresh data ships itself.
name: Harvest history data

on:
  schedule:
    - cron: '17 3 * * *' # nightly, 03:17 UTC (quiet hours for the query service)
  workflow_dispatch: # the "Run workflow" button — the Captain's one-click harvest

permissions:
  contents: write

concurrency:
  group: harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch new events from Wikidata (additive)
        # Cap the fetch itself (a full sweep can outlast the job) — exit 124 is
        # fine: the script writes incrementally, so whatever it gathered still
        # gets committed below. The Captain's first button-run was cancelled at
        # the job timeout WITH data in hand; never again.
        run: timeout 55m node scripts/fetch-wikidata-events.mjs || [ $? -eq 124 ]
      - name: Fetch notable people (documented + traditional)
        # This step did not exist until 2026-07-20, which is why every single
        # person in events.json was hand-added: the people harvest was written,
        # committed, and then never actually run. Same timeout treatment as
        # above — partial results are still worth keeping.
        run: timeout 25m node scripts/fetch-people.mjs || [ $? -eq 124 ]
      - name: Add the curated legends (idempotent)
        # Hand-written figures who defeat any query — no birthplace, no usable
        # date. Re-run each night so edits to the file take effect.
        run: node scripts/add-legends.mjs
      - name: Rebuild the core index
        run: node scripts/build-core-index.mjs
      - name: Lint the data (report only — never lose a night's harvest)
        # Warn-only: surfaces bad ids/coords/dates/categories in the log without
        # discarding the whole additive harvest over one bad row. Run `npm run
        # lint:data` locally (no --warn) to fail hard when cleaning up.
        run: node scripts/lint-data.mjs --warn
      - name: Commit & push if the dataset grew
        run: |
          git config user.name "chronos-harvester"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No new events this run."
          else
            git commit -m "Data: automated nightly harvest (additive)"
            # The branch may have moved during the long harvest (deploys, other
            # harvesters) — rebase our data commit on top rather than failing.
            git pull --rebase origin main
            git push
          fi
